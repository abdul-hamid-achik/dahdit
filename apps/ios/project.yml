name: Dahdit
options:
  bundleIdPrefix: dev.dahdit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
packages:
  DahditCore:
    path: Packages/DahditCore
  DahditAudio:
    path: Packages/DahditAudio
  DahditGraphQL:
    path: Packages/DahditGraphQL
  DahditUI:
    path: Packages/DahditUI
targets:
  Dahdit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Dahdit
        excludes:
          - Resources
    resources:
      - path: Dahdit/Resources
    dependencies:
      - package: DahditCore
      - package: DahditAudio
      - package: DahditGraphQL
      - package: DahditUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dahdit.app
        INFOPLIST_FILE: Dahdit/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  DahditTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DahditTests
    dependencies:
      - target: Dahdit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DahditUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DahditUITests
    dependencies:
      - target: Dahdit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Dahdit-Dev:
    build:
      targets:
        Dahdit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DahditTests
        - DahditUITests
  Dahdit-Staging:
    build:
      targets:
        Dahdit: all
    run:
      config: Debug
  Dahdit-Prod:
    build:
      targets:
        Dahdit: all
    run:
      config: Release
