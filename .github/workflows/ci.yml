name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun --cwd packages/morse-core test
      - run: bun --cwd services/api test
      - run: bun --cwd services/api run typecheck

  ios-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test
        working-directory: apps/ios/Packages/DahditCore

